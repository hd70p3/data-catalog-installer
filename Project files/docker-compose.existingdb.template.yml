version: "3.9"

services:
  engrafo:
    image: engrafo/engrafo-data-catalog:latest
    ports:
      - "${MY_HOSTPORT}:8080"
    volumes:
      - "${MY_DIRECTORY}:/app/wwwroot/uploads_CSVAuto"
    networks:
      - engrafonetwork
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://0.0.0.0:8080"
      ConnectionStrings__DefaultConnection: "${MY_CONNECTIONS_STRING}"

networks:
  engrafonetwork:
    driver: bridge
